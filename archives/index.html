<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }

        item.setAttribute("target","_blank");
      }
    })
  }

  hljs.initHighlightingOnLoad();

<script>
//拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
window.Clipboard = (function(window, document, navigator) {
  var textArea,
      copy;

  // 判断是不是ios端
  function isOS() {
    return navigator.userAgent.match(/ipad|iphone/i);
  }
  //创建文本元素
  function createTextArea(text) {
    textArea = document.createElement('textArea');
    textArea.value = text;
    textArea.style.width = 0;
    textArea.style.height = 0;
    textArea.clientHeight = 0;
    textArea.clientWidth = 0;
    document.body.appendChild(textArea);
  }
  //选择内容
  function selectText() {
    var range,
        selection;

    if (isOS()) {
      range = document.createRange();
      range.selectNodeContents(textArea);
      selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      textArea.setSelectionRange(0, 999999);
    } else {
      textArea.select();
    }
  }

//复制到剪贴板
  function copyToClipboard() {        
    try{
      document.execCommand("Copy")
    }catch(err){
      alert("复制错误！请手动复制！")
    }
    document.body.removeChild(textArea);
  }

  copy = function(text) {
    createTextArea(text);
    selectText();
    copyToClipboard();
  };

  return {
    copy: copy
  };
})(window, document, navigator);

function copyCode (e) {
  if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
    let code = e.currentTarget.querySelector('code');
    var text = code.innerText;
    if (e.srcElement.textContent === '复制成功') {
      console.log('复制操作频率过高');
      return;
    }
    e.srcElement.textContent = '复制成功';
    (function(elem){
      setTimeout(() => {
        if (elem.textContent === '复制成功') {
          elem.textContent = '复制代码'
        }
      }, 1000);
    })(e.srcElement)
    Clipboard.copy(text);
  }
}

 let pres = document.querySelectorAll('pre');
 pres.forEach(pre => {
  let code = pre.querySelector('code');
  let copyElem = document.createElement('span');
  copyElem.classList.add('copy-code');
  copyElem.textContent = '复制代码';
  pre.appendChild(copyElem);
  pre.onclick = copyCode
 })
</script>

&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;c、 用自己github账号注册&lt;a href=&#34;https://render.com/&#34;&gt;render&lt;/a&gt;；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;d、 在render中拉取自己修改好的，自动识别参数，直接网页最后确认，即可部署网页。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;2githubgithub-page最简单需替换升级&#34;&gt;（2）github+github page（最简单，需替换升级）&lt;/h2&gt;
&lt;p&gt;&lt;strong&gt;github拉取博主编上传的编译好的网页文件，在github修改成自己授权的应用ID，用github page部署静态网页。&lt;/strong&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;a、 注册&lt;a href=&#34;https://github.com/&#34;&gt;github&lt;/a&gt;；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;b、 拉取博主编译好的静态网页的存储库，网址为：&lt;a href=&#34;https://github.com/setdiaoyong/teamAPI&#34;&gt;https://github.com/setdiaoyong/teamAPI&lt;/a&gt;，按照说明，修改成自己授权应用ID；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;c、 在Settings中修改库名为：自己github用户名.github.io。然后自动就部署成网页，访问网址为：https://github用户名.github.io；&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;3自有空间域名部署要求高需替换升级&#34;&gt;（3）自有空间域名部署（要求高，需替换升级）&lt;/h2&gt;
&lt;p&gt;&lt;strong&gt;要在自己空间、和https连接的域名下部署，可下载编译好的网页文件，修改成自己授权的应用ID，自行部署&lt;/strong&gt;&lt;br&gt;
（推荐&lt;a href=&#34;https://coding.net&#34;&gt;https://coding.net&lt;/a&gt;，提供免费空间，和https访问，但是需要实名认证，不喜勿用。）&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;a、 注册&lt;a href=&#34;https://github.com/&#34;&gt;github&lt;/a&gt;；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;b、 下载网址为：&lt;a href=&#34;https://github.com/setdiaoyong/teamAPI&#34;&gt;https://github.com/setdiaoyong/teamAPI&lt;/a&gt;，点击绿色下载按钮，下载zip；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;c、 上传到自有空间，按照说明，修改成自己授权应用ID，即可。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;设置应用授权&#34;&gt;设置应用授权&lt;/h1&gt;
&lt;p&gt;参考原官方项目说明，网址为：github.com/OfficeDev/msteams-app-lms-meetings (手动复制到浏览器）&lt;/p&gt;
&lt;p&gt;个人设置截图如下：&lt;/p&gt;
&lt;p&gt;-（1）在 &lt;a href=&#34;https://portal.azure.com/&#34;&gt;Azure portal&lt;/a&gt; 注册应用&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587086835316.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;a、 起名，授权登录用户类型，跳转地址Redirect URIs（http后s最好加）&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587086887866.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;b、Redirect URIs中设置https://localhost:3000/（http后s最好加）及自己部署https网址（必须https），Logout URL：https://localhost:3000/（http后必须加s），勾选隐式授权access token，ID token。&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587086915551.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
源代码中有退出跳转网址路径&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087829180.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;c、复制应用ID，待用，进入API授权设置&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587086943633.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;d、设置用户调用api，搜索online，选择readwrite权限&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087016393.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;e、根据个人使用账户权限，可能要管理员授权使用该API，可以在右上角切换管理员账户，&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087033373.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;f、点击进行管理员授权&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087047023.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
-（额外提示）一个ID可以对应多个自己部署的https:域名，在web （经群友&lt;strong&gt;别恋&lt;/strong&gt;验证）&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087067227.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h1 id=&#34;网页部署&#34;&gt;网页部署&lt;/h1&gt;
&lt;h2 id=&#34;1githubrender在线编译部署&#34;&gt;（1）github+render在线编译部署&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;a、 拉取官方项目库&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;6&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087158259.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;b、 找到文件，点击修改， 修改成自己的应用ID&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587095993662.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;7&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087385884.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;c、 用拉取的github账号登录render, 创建web空间，选择修改好应用ID的自己github库&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;8&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087523215.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;9&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087458844.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;d、 自动识别项目，填写名称，该名称就是给出网址的二级域名，其他无需更改，直接点击确认。&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587096508631.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;e、部署成功后，就给出访问网址，填写到之前应用授权处。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;10&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087616891.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;2githubgithub-page部署&#34;&gt;（2）github+github Page部署&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;a、拉取博主github上传编译好的网页文件：网址为：github.com/setdiaoyong/setdiaoyong.github.io (手动复制到浏览器）&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;11&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087673518.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;b、在github网页中打开static\js，分别搜索main.b09a1c35.chunk.js和main.b09a1c35.chunk.js.map ，打开后，点击右上角笔图标，进行编辑，分别搜索 {授权appID} ，将 {授权appID}  连 {}挂号 一起替换成至自己设置好的app ID&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087271380.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;c、修改库名为：自己github用户名.github.io&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;12&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087703757.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;d、修改好，滚动本页到下方，可以看到，访问地址，即可访问&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;13&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087873568.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;##（3）自由空间域名部署及设置参照github page部署方法&lt;/p&gt;
&lt;h1 id=&#34;访问网页&#34;&gt;访问网页&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;a、访问部署成功的网址&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;14&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087924283.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;b、登录账户，不报错，不闪退，跳转进入如下界面&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;15&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587087952044.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;ul&gt;
&lt;li&gt;c、创建一个meeting，此次省略截图，完成调用，也继续可跳转到web端的team视频会议软件体验一下&lt;/li&gt;
&lt;/ul&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;16&#34;&gt;&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587088091091.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h1 id=&#34;问题解决&#34;&gt;问题解决&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;a、关键是授权设置，注意用设置登录类型范围内的账户登录，&lt;/li&gt;
&lt;li&gt;b、如果登录报错，要看具体错误类型，再回去修改授权，未设置好Redirect URIs，会提示Redirect URIs不符合&lt;/li&gt;
&lt;li&gt;c、如果登录闪退，隐式授权access token 和ID token 未勾选&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;注：感谢浅忆博客-E5技术交流群的群友：&lt;strong&gt;别恋&lt;/strong&gt;，&lt;strong&gt;流浪&lt;/strong&gt; 提供了反馈。&lt;/p&gt;
&lt;h1 id=&#34;邀请他人注册调用的授权设置&#34;&gt;邀请他人注册调用的授权设置&lt;/h1&gt;
&lt;h2 id=&#34;1管理员登录特定网址授权暂时办法&#34;&gt;1.管理员登录特定网址授权（暂时办法）&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;a、子账号登录他人部署的应用，会报出需要管理员授权&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587091316482.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;b、可以从要登录应用跳转的微软sigin in界面复制网址来提取登录应用id和redirect_uri：&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587086688972.png&#34; alt=&#34;提取信息&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;c、将提取的应用id和redirect_uri替换以下网址的部分：login.microsoftonline.com/common/adminconsent?client_id=要登录的应用ID&amp;amp;redirect_uri=要登录应用的跳转地址&lt;/li&gt;
&lt;li&gt;d、 将替换好的网址复制到浏览器 .&lt;br&gt;
参见&lt;a href=&#34;https://docs.microsoft.com/zh-CN/microsoft-365/admin/add-users/about-admin-roles?WT.mc_id=365AdminCSH&amp;amp;view=o365-worldwide&#34;&gt;官方文档1&lt;/a&gt;，&lt;a href=&#34;https://docs.microsoft.com/en-us/azure/active-directory/develop/howto-convert-app-to-be-multi-tenant&#34; title=&#34;官方文档2&#34;&gt;官方文档2&lt;/a&gt;、&lt;a href=&#34;https://docs.microsoft.com/zh-cn/graph/permissions-reference&#34; title=&#34;官方文档3&#34;&gt;官方文档3&lt;/a&gt;、&lt;a href=&#34;https://docs.microsoft.com/zh-cn/graph/auth-cloudsolutionprovider&#34; title=&#34;官方文档4*&#34;&gt;官方文档4*&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;e、修改好，用管理员账号登录，接受应用需要的授权，然后在azure中修改：&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092151066.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;f、打开组织应用&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092143391.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;g、打开所有应用，搜索之前记录的他人应用名&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092163163.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;h、以自己部署的为例，需要更换为在所有应用中搜索，我部署的应用名为teamstudy。&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092135736.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;i、点击添加用户，此处已有的一个用户为管理员&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092113693.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;j、添加允许登录的子账号&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092106702.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;k、删除管理员授权，保证安全&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587092099707.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;2管理员中心设置允许用户请求授权官方preview&#34;&gt;2.管理员中心设置允许用户请求授权（官方preview）&lt;/h2&gt;
&lt;p&gt;官方还在开发，设置后无法保存。&lt;br&gt;
&lt;img src=&#34;https://blog.xbreeding.com/post-images/1587295592959.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h1 id=&#34;未来计划&#34;&gt;未来计划&lt;/h1&gt;
&lt;p&gt;&lt;strong&gt;（1）周期性定时邮件及自动回复维持子账号电子邮件活跃度&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;（2）已检测，官方已忽略，不会识别为用户活跃——微软自动化工作流软件Power Automate提高子账号活跃度。&lt;a href=&#34;https://docs.microsoft.com/zh-cn/learn/modules/get-started-flows/&#34;&gt;参考官方学习文档&lt;/a&gt;。&lt;/strong&gt;&lt;/p&gt;
">Office 365 team API可无设备，无域名部署，需登录账户调用</a>
        </div>

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;小白，在度娘里也没找准针对性文章，瞎填，但已经维持一段时间不失效了，希望是瞎猫碰上死耗子，一直维持下去。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;h1 id=\&#34;问题描述\&#34;&gt;&lt;strong&gt;问题描述&lt;/strong&gt;&lt;/h1&gt;\n&lt;p&gt;-1、gearhost免费空间部署了oneindex，但是不会设置自动刷新缓存，只能手动访问链接，检测失效，以及手动进后台重建缓存，刷新refresh token，才能重新访问onedrive。&lt;/p&gt;\n&lt;p&gt;-2、从群友那讨来的一元免费空间，部署了oneindex，不会设置刷新，过一段时间也无法访问。&lt;/p&gt;\n&lt;h1 id=\&#34;在后台瞎设置\&#34;&gt;&lt;strong&gt;在后台瞎设置&lt;/strong&gt;&lt;/h1&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587212919814.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&#34;,&#34;fileName&#34;:&#34;dMbiPACR5&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;小白，在度娘里也没找准针对性文章，瞎填，但已经维持一段时间不失效了，希望是瞎猫碰上死耗子，一直维持下去。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;（非专业操作）免费空间维持oneindex 长期授权的缓存设置&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-04-17 22:14:11&#34;,&#34;dateFormat&#34;:&#34;2020-04-17&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://blog.xbreeding.com/dMbiPACR5/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:30000,&#34;words&#34;:145,&#34;minutes&#34;:1},&#34;description&#34;:&#34;小白，在度娘里也没找准针对性文章，瞎填，但已经维持一段时间不失效了，希望是瞎猫碰上死耗子，一直维持下去。\n\n问题描述\n-1、gearhost免费空间部署了oneindex，但是不会设置自动刷新缓存，只能手动访问链接，检测失效，以及手动进后台...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%97%AE%E9%A2%98%E6%8F%8F%E8%BF%B0\&#34;&gt;&lt;strong&gt;问题描述&lt;/strong&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9C%A8%E5%90%8E%E5%8F%B0%E7%9E%8E%E8%AE%BE%E7%BD%AE\&#34;&gt;&lt;strong&gt;在后台瞎设置&lt;/strong&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;&lt;strong&gt;拜请诸方大佬，各显神通，有缘续订&lt;/strong&gt;&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;h1 id=\&#34;特别致谢\&#34;&gt;特别致谢&lt;/h1&gt;\n&lt;p&gt;-（1）感谢 &lt;a href=\&#34;https://blog.curlc.com/archives/687.html\&#34;&gt;浅忆博客&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;-（2）感谢浅忆博客-E5技术交流群的群友：&lt;strong&gt;别恋&lt;/strong&gt;，&lt;strong&gt;流浪&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&#34;https://jq.qq.com/?_wv=1027&amp;amp;k=52yJp9C\&#34;&gt;点击此加入群聊【E5技术交流群】&lt;/a&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;成功示例\&#34;&gt;成功示例&lt;/h1&gt;\n&lt;p&gt;-（1）github+render部署：&lt;a href=\&#34;https://teamstudy.onrender.com/\&#34;&gt;https://teamstudy.onrender.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;-（2）自己空间域名上传静态文件部署coding.net：&lt;a href=\&#34;https://h0hyvx.coding-pages.com\&#34;&gt;https://h0hyvx.coding-pages.com&lt;/a&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;特别说明\&#34;&gt;特别说明&lt;/h1&gt;\n&lt;p&gt;-（1）非自动调用API，靠注册用户调用api保活，该活动信息可能不会在管理员用户活跃统计图中显示，不喜勿用。&lt;/p&gt;\n&lt;p&gt;-（2）一定要设置好应用授权，web 跳转地址Redirect URIs，和，API授权，隐式授权等，不然用户登录界面报错，或闪退，以及退出后跳转报错。&lt;/p&gt;\n&lt;p&gt;-（3）如果要用自己域名，需要设置ssl的https安全连接，不然在应用授权中心无法设置跳转网址Redirect URIs。还要设置Logout URL为 https://localhost:3000/，不然可能退出后跳转报错。&lt;/p&gt;\n&lt;p&gt;-（4）个人账户只能登录team app，无法创建会议，只能用学校和工作账号登录进行创建，自己创建的自己组织所有子账户无需管理员授权即可登录，但他人管理员账号登录即可授权，但他人子账号登录，需要其管理员对子账号进行授权，跳转本文第7小节，设置管理员授权。&lt;/p&gt;\n&lt;p&gt;-（5）具体设置参照官方项目说明，根据自己测试添加，如果不清楚，请移步官方项目github库github.com/OfficeDev/msteams-app-lms-meetings (手动复制到浏览器）。&lt;/p&gt;\n&lt;h1 id=\&#34;前期基础\&#34;&gt;前期基础&lt;/h1&gt;\n&lt;p&gt;（1）参考 &lt;strong&gt;浅忆博客&lt;/strong&gt;：&lt;a href=\&#34;https://blog.curlc.com/archives/599.html\&#34;&gt;新版可续签的Office 365开发者试用订阅！E5(附自动续订的方法)&lt;/a&gt;。申请office 365 开发者订阅。&lt;/p&gt;\n&lt;p&gt;（2）参考 &lt;strong&gt;啊哈程序&lt;/strong&gt;：[Github Page---- 搭建个人博客] 网址：blog.csdn.net/yuexianchang/article/details/53431703 (手动复制到浏览器）。&lt;/p&gt;\n&lt;h1 id=\&#34;部署技术路线\&#34;&gt;部署技术路线&lt;/h1&gt;\n&lt;h2 id=\&#34;1githubrender简单可在线修改升级\&#34;&gt;（1）github+render（简单，可在线修改升级）。&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;github拉取officedev官方源码，修改成自己授权的ID，render在线编译部署网页&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;a、 注册&lt;a href=\&#34;https://github.com/\&#34;&gt;github&lt;/a&gt;；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;b、 拉取官方源代码，网址为：github.com/OfficeDev/msteams-app-lms-meetings (手动复制到浏览器）修改成自己授权应用ID；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;c、 用自己github账号注册&lt;a href=\&#34;https://render.com/\&#34;&gt;render&lt;/a&gt;；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;d、 在render中拉取自己修改好的，自动识别参数，直接网页最后确认，即可部署网页。&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;2githubgithub-page最简单需替换升级\&#34;&gt;（2）github+github page（最简单，需替换升级）&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;github拉取博主编上传的编译好的网页文件，在github修改成自己授权的应用ID，用github page部署静态网页。&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;a、 注册&lt;a href=\&#34;https://github.com/\&#34;&gt;github&lt;/a&gt;；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;b、 拉取博主编译好的静态网页的存储库，网址为：&lt;a href=\&#34;https://github.com/setdiaoyong/teamAPI\&#34;&gt;https://github.com/setdiaoyong/teamAPI&lt;/a&gt;，按照说明，修改成自己授权应用ID；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;c、 在Settings中修改库名为：自己github用户名.github.io。然后自动就部署成网页，访问网址为：https://github用户名.github.io；&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;3自有空间域名部署要求高需替换升级\&#34;&gt;（3）自有空间域名部署（要求高，需替换升级）&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;要在自己空间、和https连接的域名下部署，可下载编译好的网页文件，修改成自己授权的应用ID，自行部署&lt;/strong&gt;&lt;br&gt;\n（推荐&lt;a href=\&#34;https://coding.net\&#34;&gt;https://coding.net&lt;/a&gt;，提供免费空间，和https访问，但是需要实名认证，不喜勿用。）&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;a、 注册&lt;a href=\&#34;https://github.com/\&#34;&gt;github&lt;/a&gt;；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;b、 下载网址为：&lt;a href=\&#34;https://github.com/setdiaoyong/teamAPI\&#34;&gt;https://github.com/setdiaoyong/teamAPI&lt;/a&gt;，点击绿色下载按钮，下载zip；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;c、 上传到自有空间，按照说明，修改成自己授权应用ID，即可。&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1 id=\&#34;设置应用授权\&#34;&gt;设置应用授权&lt;/h1&gt;\n&lt;p&gt;参考原官方项目说明，网址为：github.com/OfficeDev/msteams-app-lms-meetings (手动复制到浏览器）&lt;/p&gt;\n&lt;p&gt;个人设置截图如下：&lt;/p&gt;\n&lt;p&gt;-（1）在 &lt;a href=\&#34;https://portal.azure.com/\&#34;&gt;Azure portal&lt;/a&gt; 注册应用&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587086835316.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;a、 起名，授权登录用户类型，跳转地址Redirect URIs（http后s最好加）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587086887866.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;b、Redirect URIs中设置https://localhost:3000/（http后s最好加）及自己部署https网址（必须https），Logout URL：https://localhost:3000/（http后必须加s），勾选隐式授权access token，ID token。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587086915551.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n源代码中有退出跳转网址路径&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087829180.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;c、复制应用ID，待用，进入API授权设置&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587086943633.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;d、设置用户调用api，搜索online，选择readwrite权限&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087016393.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;e、根据个人使用账户权限，可能要管理员授权使用该API，可以在右上角切换管理员账户，&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;4\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087033373.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;f、点击进行管理员授权&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087047023.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n-（额外提示）一个ID可以对应多个自己部署的https:域名，在web （经群友&lt;strong&gt;别恋&lt;/strong&gt;验证）&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;5\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087067227.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h1 id=\&#34;网页部署\&#34;&gt;网页部署&lt;/h1&gt;\n&lt;h2 id=\&#34;1githubrender在线编译部署\&#34;&gt;（1）github+render在线编译部署&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;a、 拉取官方项目库&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;6\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087158259.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;b、 找到文件，点击修改， 修改成自己的应用ID&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587095993662.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;7\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087385884.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;c、 用拉取的github账号登录render, 创建web空间，选择修改好应用ID的自己github库&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;8\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087523215.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;9\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087458844.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;d、 自动识别项目，填写名称，该名称就是给出网址的二级域名，其他无需更改，直接点击确认。&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587096508631.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;e、部署成功后，就给出访问网址，填写到之前应用授权处。&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;10\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087616891.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;2githubgithub-page部署\&#34;&gt;（2）github+github Page部署&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;a、拉取博主github上传编译好的网页文件：网址为：github.com/setdiaoyong/setdiaoyong.github.io (手动复制到浏览器）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;11\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087673518.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;b、在github网页中打开static\\js，分别搜索main.b09a1c35.chunk.js和main.b09a1c35.chunk.js.map ，打开后，点击右上角笔图标，进行编辑，分别搜索 {授权appID} ，将 {授权appID}  连 {}挂号 一起替换成至自己设置好的app ID&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087271380.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;c、修改库名为：自己github用户名.github.io&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;12\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087703757.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;d、修改好，滚动本页到下方，可以看到，访问地址，即可访问&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;13\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087873568.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;##（3）自由空间域名部署及设置参照github page部署方法&lt;/p&gt;\n&lt;h1 id=\&#34;访问网页\&#34;&gt;访问网页&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;a、访问部署成功的网址&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;14\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087924283.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;b、登录账户，不报错，不闪退，跳转进入如下界面&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;15\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587087952044.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ul&gt;\n&lt;li&gt;c、创建一个meeting，此次省略截图，完成调用，也继续可跳转到web端的team视频会议软件体验一下&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;16\&#34;&gt;&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587088091091.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h1 id=\&#34;问题解决\&#34;&gt;问题解决&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;a、关键是授权设置，注意用设置登录类型范围内的账户登录，&lt;/li&gt;\n&lt;li&gt;b、如果登录报错，要看具体错误类型，再回去修改授权，未设置好Redirect URIs，会提示Redirect URIs不符合&lt;/li&gt;\n&lt;li&gt;c、如果登录闪退，隐式授权access token 和ID token 未勾选&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;注：感谢浅忆博客-E5技术交流群的群友：&lt;strong&gt;别恋&lt;/strong&gt;，&lt;strong&gt;流浪&lt;/strong&gt; 提供了反馈。&lt;/p&gt;\n&lt;h1 id=\&#34;邀请他人注册调用的授权设置\&#34;&gt;邀请他人注册调用的授权设置&lt;/h1&gt;\n&lt;h2 id=\&#34;1管理员登录特定网址授权暂时办法\&#34;&gt;1.管理员登录特定网址授权（暂时办法）&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;a、子账号登录他人部署的应用，会报出需要管理员授权&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587091316482.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;b、可以从要登录应用跳转的微软sigin in界面复制网址来提取登录应用id和redirect_uri：&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587086688972.png\&#34; alt=\&#34;提取信息\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;c、将提取的应用id和redirect_uri替换以下网址的部分：login.microsoftonline.com/common/adminconsent?client_id=要登录的应用ID&amp;amp;redirect_uri=要登录应用的跳转地址&lt;/li&gt;\n&lt;li&gt;d、 将替换好的网址复制到浏览器 .&lt;br&gt;\n参见&lt;a href=\&#34;https://docs.microsoft.com/zh-CN/microsoft-365/admin/add-users/about-admin-roles?WT.mc_id=365AdminCSH&amp;amp;view=o365-worldwide\&#34;&gt;官方文档1&lt;/a&gt;，&lt;a href=\&#34;https://docs.microsoft.com/en-us/azure/active-directory/develop/howto-convert-app-to-be-multi-tenant\&#34; title=\&#34;官方文档2\&#34;&gt;官方文档2&lt;/a&gt;、&lt;a href=\&#34;https://docs.microsoft.com/zh-cn/graph/permissions-reference\&#34; title=\&#34;官方文档3\&#34;&gt;官方文档3&lt;/a&gt;、&lt;a href=\&#34;https://docs.microsoft.com/zh-cn/graph/auth-cloudsolutionprovider\&#34; title=\&#34;官方文档4*\&#34;&gt;官方文档4*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;e、修改好，用管理员账号登录，接受应用需要的授权，然后在azure中修改：&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092151066.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;f、打开组织应用&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092143391.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;g、打开所有应用，搜索之前记录的他人应用名&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092163163.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;h、以自己部署的为例，需要更换为在所有应用中搜索，我部署的应用名为teamstudy。&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092135736.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;i、点击添加用户，此处已有的一个用户为管理员&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092113693.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;j、添加允许登录的子账号&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092106702.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;li&gt;k、删除管理员授权，保证安全&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587092099707.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;2管理员中心设置允许用户请求授权官方preview\&#34;&gt;2.管理员中心设置允许用户请求授权（官方preview）&lt;/h2&gt;\n&lt;p&gt;官方还在开发，设置后无法保存。&lt;br&gt;\n&lt;img src=\&#34;https://blog.xbreeding.com/post-images/1587295592959.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;未来计划\&#34;&gt;未来计划&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;（1）周期性定时邮件及自动回复维持子账号电子邮件活跃度&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;（2）已检测，官方已忽略，不会识别为用户活跃——微软自动化工作流软件Power Automate提高子账号活跃度。&lt;a href=\&#34;https://docs.microsoft.com/zh-cn/learn/modules/get-started-flows/\&#34;&gt;参考官方学习文档&lt;/a&gt;。&lt;/strong&gt;&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;mYQjpWO-3&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;&lt;strong&gt;拜请诸方大佬，各显神通，有缘续订&lt;/strong&gt;&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Office 365 team API可无设备，无域名部署，需登录账户调用&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;office365 API 保活&#34;,&#34;slug&#34;:&#34;t71kEAhYi&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://blog.xbreeding.com/t71kEAhYi/&#34;}],&#34;date&#34;:&#34;2020-04-17 08:39:54&#34;,&#34;dateFormat&#34;:&#34;2020-04-17&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://blog.xbreeding.com/mYQjpWO-3/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;8 min read&#34;,&#34;time&#34;:441000,&#34;words&#34;:1970,&#34;minutes&#34;:8},&#34;description&#34;:&#34;拜请诸方大佬，各显神通，有缘续订\n\n特别致谢\n-（1）感谢 浅忆博客\n-（2）感谢浅忆博客-E5技术交流群的群友：别恋，流浪\n点击此加入群聊【E5技术交流群】\n成功示例\n-（1）github+render部署：https://teamstu...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%89%B9%E5%88%AB%E8%87%B4%E8%B0%A2\&#34;&gt;特别致谢&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%88%90%E5%8A%9F%E7%A4%BA%E4%BE%8B\&#34;&gt;成功示例&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%89%B9%E5%88%AB%E8%AF%B4%E6%98%8E\&#34;&gt;特别说明&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%89%8D%E6%9C%9F%E5%9F%BA%E7%A1%80\&#34;&gt;前期基础&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%83%A8%E7%BD%B2%E6%8A%80%E6%9C%AF%E8%B7%AF%E7%BA%BF\&#34;&gt;部署技术路线&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1githubrender%E7%AE%80%E5%8D%95%E5%8F%AF%E5%9C%A8%E7%BA%BF%E4%BF%AE%E6%94%B9%E5%8D%87%E7%BA%A7\&#34;&gt;（1）github+render（简单，可在线修改升级）。&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2githubgithub-page%E6%9C%80%E7%AE%80%E5%8D%95%E9%9C%80%E6%9B%BF%E6%8D%A2%E5%8D%87%E7%BA%A7\&#34;&gt;（2）github+github page（最简单，需替换升级）&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=
